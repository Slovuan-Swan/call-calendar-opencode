name: OpenCode Issue Assistant

on:
  issue_comment:
    types: [created]

jobs:
  opencode:
    # Запускаем только если коммент содержит команду и автора-владельца
    if: |
      contains(github.event.comment.body, '/oc') || 
      contains(github.event.comment.body, '/opencode')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
      contents: write
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1 # Скачиваем только последний коммит, чтобы не виснуть

      - name: Run OpenCode
        # Фиксируем конкретную стабильную ветку v1 вместо плавающего latest
        uses: anomalyco/opencode/github@v1
        env:
          GOOGLE_GENERATIVE_AI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        with:
          model: google/gemini-3.5-flash
